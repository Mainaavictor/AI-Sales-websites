<!DOCTYPE html>
<html>
    <head>
        <title>Smart AI Shop</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Welcome To Nuru-Collections</h1>
        <div class="order-Box">
            <h2>Order Form</h2>
            <form id="orderform">
            <input type="text" placeholders="Full Name" required>
            <input type="text" placeholder="Product you want"required>
            <input type="text" placeholder="Your Location"required>
            <input type="text" placeholder="Phone Number"required>
            <button type="submit">Submit Order</button>
            </form>
        </div>
        <div class="chat-container">
            <h2>AI Sales Assistant</h2>
          <div id="chatbox"></div>
          <input id="userinput" placeholder="Ask about our products..."
          <button onclick="sendmessage()">Send</button>
        </div>
        <script src="script.js"></script>   
    </body>
</html>
